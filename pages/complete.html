<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文房四宝 - 制作完成</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <!-- 竖屏提示层 -->
    <div id="orientation-hint">
        <div class="hint-icon">📱</div>
        <div class="hint-text">请横屏观看</div>
    </div>
    
    <div class="scene scene-complete">
        <button class="back-btn" onclick="goBack()">← 返回</button>
        <div class="page-number">7/8</div>
        <div class="complete-maojian-stack" aria-hidden="true">
            <div class="swipe-indicator"></div>
        </div>
        <img class="complete-mohao" src="../images/icons/mohao.png" alt="mohao">
        <div class="mohao-interaction-indicator"></div>
        <img class="complete-maojian complete-maojian-3" src="../images/icons/maojian3.png" alt="毛尖3">
        <img class="complete-maojian complete-maojian-2" src="../images/icons/maojian2.png" alt="毛尖2">
        <img class="complete-maojian complete-maojian-1" src="../images/icons/maojian1.png" alt="毛尖1">
        <img class="complete-mohaokou" src="../images/icons/mohaokou.png" alt="mohaokou">
        <img class="complete-mohaobi" src="../images/icons/mohaobi.png" alt="mohaobi">
        <img class="complete-jiaoshui" src="../images/icons/jiaoshui.png" alt="胶水">
        <button class="refresh-btn" onclick="location.reload()"></button>
        <div class="final-next-container">
            <span class="final-next-text" data-text="从选材到成品，匠心至此，不如挥毫一试">从选材到成品，匠心至此，不如挥毫一试</span>
            <button class="final-next-btn" onclick="goToPage('drawing.html')">→</button>
        </div>
        <div id="complete-hint">
            <span id="complete-hint-text"></span>
        </div>
    </div>
    
    <script src="../js/main.js"></script>
    <script>
        (function() {
            // 屏幕方向检测
            const orientationHint = document.getElementById('orientation-hint');
            const scene = document.querySelector('.scene');
            
            function checkOrientation() {
                const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
                
                if (!isMobile) {
                    // 非移动端不显示提示
                    orientationHint.classList.remove('visible');
                    scene.classList.remove('hidden-on-portrait');
                    return;
                }
                
                const isPortrait = window.innerHeight > window.innerWidth;
                
                if (isPortrait) {
                    // 竖屏：显示提示，隐藏内容
                    orientationHint.classList.add('visible');
                    scene.classList.add('hidden-on-portrait');
                } else {
                    // 横屏：隐藏提示，显示内容
                    orientationHint.classList.remove('visible');
                    scene.classList.remove('hidden-on-portrait');
                }
            }
            
            // 初始检查
            checkOrientation();
            
            // 监听窗口大小变化和方向变化
            window.addEventListener('resize', checkOrientation);
            window.addEventListener('orientationchange', checkOrientation);
        })();
    </script>
</body>
</html>
