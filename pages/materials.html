<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文房四宝 - 准备材料</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <!-- 竖屏提示层 -->
    <div id="orientation-hint">
        <div class="hint-icon">📱</div>
        <div class="hint-text">请横屏观看</div>
    </div>
    
    <div class="scene scene-materials">
        <button class="back-btn" onclick="goBack()">← 返回</button>
        <div class="page-number">2/8</div>
        
        <div class="content">
            <h1 class="scene-title">将毛团放在纸上，用刷子刷齐</h1>
            
            <!-- 第一张图片：篮子左上白色毛团位置（锚点在中心） -->
            <div id="ball-item-1" class="draggable-item" style="position: absolute; top: 25%; left: 22%; transform: translate(-50%, -50%); z-index: 100; pointer-events: none; user-select: none; -webkit-user-select: none; transition: top 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), left 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), transform 0.2s ease;">
                <img src="../images/icons/maoliao.png" alt="毛料" style="width: 640px; height: auto; display: block; pointer-events: none; -webkit-user-drag: none;">
                <div class="drag-handle" style="position: absolute; top: 50%; left: 50%; width: 140px; height: 140px; margin-left: -70px; margin-top: -70px; cursor: grab; pointer-events: auto; background: transparent;"></div>
            </div>
            <!-- 第二张图片：篮子左下深棕色毛团位置（锚点在中心） -->
            <div id="ball-item-2" class="draggable-item" style="position: absolute; top: 48%; left: calc(18% - 90px); transform: translate(-50%, -50%); z-index: 100; pointer-events: none; user-select: none; -webkit-user-select: none; transition: top 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), left 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), transform 0.2s ease;">
                <img src="../images/icons/maoliao.png" alt="毛料" style="width: 640px; height: auto; display: block; pointer-events: none; -webkit-user-drag: none;">
                <div class="drag-handle" style="position: absolute; top: 50%; left: 50%; width: 140px; height: 140px; margin-left: -70px; margin-top: -70px; cursor: grab; pointer-events: auto; background: transparent;"></div>
            </div>
            <!-- 第三张图片：最下方毛团（锚点在中心） -->
            <div id="ball-item-3" class="draggable-item" style="position: absolute; top: 71%; left: calc(20% - 20px); transform: translate(-50%, -50%); z-index: 100; pointer-events: none; user-select: none; -webkit-user-select: none; transition: top 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), left 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), transform 0.2s ease;">
                <img src="../images/icons/maoliao.png" alt="毛料" style="width: 640px; height: auto; display: block; pointer-events: none; -webkit-user-drag: none;">
                <div class="drag-handle" style="position: absolute; top: 50%; left: 50%; width: 140px; height: 140px; margin-left: -70px; margin-top: -70px; cursor: grab; pointer-events: auto; background: transparent;"></div>
            </div>
            <!-- 中间图片：齐毛（居中对齐，背景之上） -->
            <div id="center-item" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 50; opacity: 0;">
                <img src="../images/icons/jinmaoliao.png" alt="齐毛" style="width: 800px; height: auto; display: block;">
            </div>
            
            <!-- 刷子（锚点在中心） -->
            <div id="brush-item" style="position: absolute; top: calc(45% + 70px); left: calc(70% + 50px); transform: translate(-50%, -50%); z-index: 200; pointer-events: none; user-select: none; -webkit-user-select: none; transition: top 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), left 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), transform 0.2s ease;">
                <img src="../images/icons/shuazi.png" alt="刷子" style="width: 900px; height: auto; display: block; pointer-events: none; -webkit-user-drag: none;">
                <!-- 中心把手：唯一可抓取的区域（不可见） -->
                <div id="brush-handle" style="position: absolute; top: 50%; left: 50%; width: 140px; height: 140px; margin-left: -70px; margin-top: -70px; cursor: grab; pointer-events: auto; background: transparent;"></div>
            </div>
            
            <button class="refresh-btn" onclick="location.reload()"></button>
            
            <div id="hint-bottom-fix" style="
                position: fixed;
                bottom: 50px;
                left: 0;
                right: 0;
                text-align: center;
                z-index: 2000;
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.5s ease;
            ">
                <button id="next-btn-fix" onclick="goToPage('process-pen.html')" style="
                    padding: 15px 50px;
                    background: linear-gradient(135deg, #d4af37, #b8860b);
                    border: none;
                    border-radius: 30px;
                    color: #1a1a2e;
                    font-family: 'STKaiti', 'Kaiti SC', serif;
                    font-size: 1.4rem;
                    font-weight: bold;
                    cursor: pointer;
                    transition: transform 0.3s ease, box-shadow 0.3s ease;
                    box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
                    pointer-events: auto;
                    transform: scale(0.75);
                    transform-origin: center center;
                " onmouseover="this.style.transform='scale(0.81)'; this.style.boxShadow='0 6px 20px rgba(212, 175, 55, 0.6)'" onmouseout="this.style.transform='scale(0.75)'; this.style.boxShadow='0 4px 15px rgba(212, 175, 55, 0.4)'">
                    下一步
                </button>
            </div>
        </div>
    </div>
    
    <script src="../js/main.js"></script>
    <script>
    (function () {
        var brush = document.getElementById('brush-item');
        var handle = document.getElementById('brush-handle');
        var centerItem = document.getElementById('center-item');
        if (!brush || !handle) return;

        var originalTop = brush.style.top;
        var originalLeft = brush.style.left;

        var isDragging = false;
        var offsetX = 0;
        var offsetY = 0;
        
        var frictionCount = 0;
        var lastY = 0;
        var frictionDirection = 0;
        var processingComplete = false;

        function getScreenCenter() {
            return { x: window.innerWidth / 2, y: window.innerHeight / 2 };
        }

        function isBrushOverCenterBall() {
            var brushRect = brush.getBoundingClientRect();
            var center = getScreenCenter();
            var brushCenterX = brushRect.left + brushRect.width / 2;
            var brushCenterY = brushRect.top + brushRect.height / 2;
            var dx = brushCenterX - center.x;
            var dy = brushCenterY - center.y;
            return Math.sqrt(dx * dx + dy * dy) < 250;
        }

        function onPointerDown(e) {
            isDragging = true;
            handle.style.cursor = 'grabbing';
            brush.style.transition = 'none';
            brush.style.transform = 'translate(-50%, -50%) rotate(-80deg)';

            var point = (e.touches && e.touches[0]) ? e.touches[0] : e;
            var rect = brush.getBoundingClientRect();
            offsetX = point.clientX - (rect.left + rect.width / 2);
            offsetY = point.clientY - (rect.top + rect.height / 2);
            lastY = point.clientY;
            frictionDirection = 0;
            frictionCount = 0;

            var centerX = rect.left + rect.width / 2;
            var centerY = rect.top + rect.height / 2;
            brush.style.left = centerX + 'px';
            brush.style.top = centerY + 'px';

            if (e.cancelable) e.preventDefault();
        }

        function onPointerMove(e) {
            if (!isDragging) return;
            
            var point = (e.touches && e.touches[0]) ? e.touches[0] : e;
            brush.style.left = (point.clientX - offsetX) + 'px';
            brush.style.top = (point.clientY - offsetY) + 'px';
            brush.style.transform = 'translate(-50%, -50%) rotate(-80deg)';

            if (!processingComplete && isBrushOverCenterBall()) {
                var hasCenterBall = document.querySelector('.draggable-item[data-in-center="true"]');
                if (!hasCenterBall) return;
                
                var currentY = point.clientY;
                var direction = currentY > lastY ? 1 : -1;
                
                if (frictionDirection === 0) {
                    frictionDirection = direction;
                } else if (direction !== frictionDirection && direction !== 0) {
                    frictionCount++;
                    frictionDirection = direction;
                    
                    if (frictionCount >= 20) {
                        completeProcessing();
                    }
                }
                
                lastY = currentY;
            }
        }

        function completeProcessing() {
            processingComplete = true;
            
            var centerBall = document.querySelector('.draggable-item[data-in-center="true"]');
            if (centerBall) {
                centerBall.style.opacity = '0';
                centerBall.style.transition = 'opacity 0.5s ease';
                var handle = centerBall.querySelector('.drag-handle');
                if (handle) {
                    handle.style.cursor = 'default';
                }
            }

            setTimeout(function() {
                if (centerItem) {
                    centerItem.style.opacity = '1';
                    centerItem.style.transition = 'opacity 1s ease';
                }
                
                var nextBtnContainer = document.getElementById('hint-bottom-fix');
                if (nextBtnContainer) {
                    setTimeout(function() {
                        nextBtnContainer.style.opacity = '1';
                        nextBtnContainer.style.pointerEvents = 'auto';
                    }, 1000);
                }
            }, 300);
        }

        function onPointerUp() {
            if (!isDragging) return;
            isDragging = false;
            handle.style.cursor = 'grab';
            
            brush.style.transition = 'top 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), left 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)';
            brush.style.top = originalTop;
            brush.style.left = originalLeft;
            brush.style.transform = 'translate(-50%, -50%)';
        }

        handle.addEventListener('mousedown', onPointerDown);
        document.addEventListener('mousemove', onPointerMove);
        document.addEventListener('mouseup', onPointerUp);

        handle.addEventListener('touchstart', onPointerDown, { passive: false });
        document.addEventListener('touchmove', onPointerMove, { passive: false });
        document.addEventListener('touchend', onPointerUp);

        window.processingComplete = function() { return processingComplete; };
    })();
    </script>
    
    <script>
    (function () {
        var balls = document.querySelectorAll('.draggable-item');
        var centerBall = null;
        var centerRadius = 200;

        function getScreenCenter() {
            return {
                x: window.innerWidth / 2,
                y: window.innerHeight / 2
            };
        }

        function distanceToCenter(x, y) {
            var center = getScreenCenter();
            var dx = x - center.x;
            var dy = y - center.y;
            return Math.sqrt(dx * dx + dy * dy);
        }

        function isInCenterZone(x, y) {
            return distanceToCenter(x, y) <= centerRadius;
        }

        function releaseCenterBall() {
            var existingCenterBall = document.querySelector('.draggable-item[data-in-center="true"]');
            if (existingCenterBall) {
                existingCenterBall.style.transition = 'top 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), left 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), transform 0.2s ease';
                existingCenterBall.style.top = existingCenterBall.getAttribute('data-original-top');
                existingCenterBall.style.left = existingCenterBall.getAttribute('data-original-left');
                existingCenterBall.setAttribute('data-in-center', 'false');
            }
            centerBall = null;
        }

        balls.forEach(function(ball) {
            var handle = ball.querySelector('.drag-handle');
            if (!handle) return;
            
            ball.setAttribute('data-original-top', ball.style.top);
            ball.setAttribute('data-original-left', ball.style.left);
            ball.setAttribute('data-dragging', 'false');
            ball.setAttribute('data-in-center', 'false');

            handle.addEventListener('mousedown', onBallDown);
            handle.addEventListener('touchstart', onBallDown, { passive: false });
        });

        function onBallDown(e) {
            var handle = e.currentTarget;
            var ball = handle.parentElement;
            
            var opacity = parseFloat(ball.style.opacity || 1);
            if (opacity === 0) {
                return;
            }
            
            var point = (e.touches && e.touches[0]) ? e.touches[0] : e;
            
            ball.setAttribute('data-dragging', 'true');
            handle.style.cursor = 'grabbing';
            ball.style.transition = 'none';

            if (ball.getAttribute('data-in-center') === 'true') {
                centerBall = null;
            }

            var rect = ball.getBoundingClientRect();
            ball.setAttribute('data-offset-x', point.clientX - (rect.left + rect.width / 2));
            ball.setAttribute('data-offset-y', point.clientY - (rect.top + rect.height / 2));

            var centerX = rect.left + rect.width / 2;
            var centerY = rect.top + rect.height / 2;
            ball.style.left = centerX + 'px';
            ball.style.top = centerY + 'px';

            if (e.cancelable) e.preventDefault();
        }

        function onBallMove(e) {
            var point = (e.touches && e.touches[0]) ? e.touches[0] : e;
            
            balls.forEach(function(ball) {
                var isDragging = ball.getAttribute('data-dragging') === 'true';
                if (!isDragging) return;

                var offsetX = parseFloat(ball.getAttribute('data-offset-x') || 0);
                var offsetY = parseFloat(ball.getAttribute('data-offset-y') || 0);
                ball.style.left = (point.clientX - offsetX) + 'px';
                ball.style.top = (point.clientY - offsetY) + 'px';
            });
        }

        function onBallUp() {
            balls.forEach(function(ball) {
                var handle = ball.querySelector('.drag-handle');
                if (!handle) return;
                
                var isDragging = ball.getAttribute('data-dragging') === 'true';
                if (!isDragging) return;

                ball.setAttribute('data-dragging', 'false');
                handle.style.cursor = 'grab';
                ball.style.transition = 'top 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), left 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), transform 0.2s ease';

                var currentX = parseFloat(ball.style.left);
                var currentY = parseFloat(ball.style.top);

                var processingDone = window.processingComplete && window.processingComplete();

                if (!processingDone && isInCenterZone(currentX, currentY)) {
                    releaseCenterBall();
                    
                    centerBall = ball;
                    ball.setAttribute('data-in-center', 'true');
                    
                    var center = getScreenCenter();
                    ball.style.left = center.x + 'px';
                    ball.style.top = center.y + 'px';
                } else {
                    if (ball.getAttribute('data-in-center') !== 'true') {
                        ball.style.top = ball.getAttribute('data-original-top');
                        ball.style.left = ball.getAttribute('data-original-left');
                    }
                }
            });
        }

        document.addEventListener('mousemove', onBallMove);
        document.addEventListener('mouseup', onBallUp);
        document.addEventListener('touchmove', onBallMove, { passive: false });
        document.addEventListener('touchend', onBallUp);
    })();
    </script>
    <script>
    (function() {
        // 屏幕方向检测
        const orientationHint = document.getElementById('orientation-hint');
        const scene = document.querySelector('.scene');
        
        function checkOrientation() {
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            
            if (!isMobile) {
                // 非移动端不显示提示
                orientationHint.classList.remove('visible');
                scene.classList.remove('hidden-on-portrait');
                return;
            }
            
            const isPortrait = window.innerHeight > window.innerWidth;
            
            if (isPortrait) {
                // 竖屏：显示提示，隐藏内容
                orientationHint.classList.add('visible');
                scene.classList.add('hidden-on-portrait');
            } else {
                // 横屏：隐藏提示，显示内容
                orientationHint.classList.remove('visible');
                scene.classList.remove('hidden-on-portrait');
            }
        }
        
        // 初始检查
        checkOrientation();
        
        // 监听窗口大小变化和方向变化
        window.addEventListener('resize', checkOrientation);
        window.addEventListener('orientationchange', checkOrientation);
    })();
    </script>
</body>
